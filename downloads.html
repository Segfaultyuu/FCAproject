<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloads – Vantos Markets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:           #7D53FF;
      --text-primary:   #000000;
      --text-secondary: #7a8699;
      --border:         #e8e9ea;
      --bg-2:           #f9f9f9;
      --shadow-card:    0 4px 12px 0 rgba(168,195,206,0.2);
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text-primary);
      background: linear-gradient(0deg, #FFF 0%, #F0FFF8 100%);
    }

    /* ── Layout ─────────────────────────────── */
    .main {
      margin-left: 240px;
      min-height: 100vh;
      padding-top: 60px;
      transition: margin-left 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    body.sidebar-collapsed .main { margin-left: 64px; }

    .dl-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* ── Page title ─────────────────────────── */
    .dl-title {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
    }

    /* ── Section ────────────────────────────── */
    .dl-section {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Section header ─────────────────────── */
    .dl-section-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dl-section-title-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dl-section-logo {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      object-fit: cover;
    }

    .dl-section-name {
      font-size: 18px;
      font-weight: 600;
      line-height: 24px;
      color: var(--text-primary);
      text-transform: capitalize;
    }

    .dl-section-desc {
      font-size: 14px;
      font-weight: 400;
      line-height: 24px;
      color: var(--text-primary);
      text-transform: capitalize;
    }

    /* ── Platform card ──────────────────────── */
    .dl-card {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Platform item ──────────────────────── */
    .dl-platform {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 17px;
      cursor: pointer;
      padding: 8px 0;
      border-radius: 8px;
      transition: background 0.15s;
      text-decoration: none;
    }
    .dl-platform:hover { background: #f9f9f9; }

    .dl-platform-icon {
      width: 50px;
      height: 50px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dl-platform-icon img {
      width: 50px;
      height: 50px;
      display: block;
    }

    /* Inline SVG icon containers */
    .dl-icon-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .dl-icon-circle.windows  { background: #e8f3fc; }
    .dl-icon-circle.macos    { background: #f4f5f6; }
    .dl-icon-circle.ios      { background: #1c1c1e; }
    .dl-icon-circle.android  { background: #f0faf3; }

    .dl-platform-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: center;
      text-transform: capitalize;
      line-height: normal;
    }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 820px) {
      .main { margin-left: 0 !important; padding-bottom: 64px; }
      .dl-container { padding: 20px 16px; }
      .dl-card { flex-wrap: wrap; gap: 16px; }
      .dl-platform { flex: 0 0 calc(50% - 8px); }
    }
  </style>
</head>
